<VirtualHost *:8080>
    DocumentRoot /app/public

    SetEnv HTTPS on

    <IfModule mod_headers.c>
        Header always set Content-Security-Policy "upgrade-insecure-requests"
    </IfModule>

    <Directory /app/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>
</VirtualHost>
